<!-- Modal Edit Profil -->
<div id="modalEditProfil" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4">
    <div class="fixed inset-0 bg-gray-900/60 backdrop-blur-sm transition-opacity" id="backdropEditProfil"></div>
    <div class="relative bg-white w-full max-w-lg rounded-3xl shadow-2xl overflow-hidden flex flex-col max-h-[90vh] animate-in zoom-in duration-200">
        <div class="px-8 py-6 border-b border-gray-100 flex items-center justify-between">
            <div>
                <h2 class="text-xl font-bold text-gray-800">Edit Informasi Profil</h2>
                <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest mt-1">Perbarui Data Pribadi Anda</p>
            </div>
            <button id="closeModalEditProfil" class="w-10 h-10 rounded-xl bg-gray-50 text-gray-400 hover:bg-red-50 hover:text-red-500 transition-all flex items-center justify-center">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div class="p-8 overflow-y-auto">
            <form id="formEditProfil" class="space-y-5">
                {% csrf_token %}
                <div class="space-y-2">
                    <label class="text-[11px] font-bold text-gray-400 uppercase tracking-widest ml-1">Nama Lengkap</label>
                    <input type="text" id="editProfilNama" value="{{ user.get_full_name|default:user.username }}" required
                        class="w-full px-5 py-3 bg-white border-2 border-gray-200 rounded-2xl text-sm font-medium text-gray-800 placeholder:text-gray-400 focus:outline-none focus:ring-4 focus:ring-blue-500/15 focus:border-blue-600 transition-all shadow-sm hover:border-gray-300">
                </div>
                <div class="space-y-2">
                    <label class="text-[11px] font-bold text-gray-400 uppercase tracking-widest ml-1">Email</label>
                    <input type="email" id="editProfilEmail" value="{{ user.email }}" required
                        class="w-full px-5 py-3 bg-white border-2 border-gray-200 rounded-2xl text-sm font-medium text-gray-800 placeholder:text-gray-400 focus:outline-none focus:ring-4 focus:ring-blue-500/15 focus:border-blue-600 transition-all shadow-sm hover:border-gray-300">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-2">
                        <label class="text-[11px] font-bold text-gray-400 uppercase tracking-widest ml-1">Instansi</label>
                        <input type="text" id="editProfilJabatan" value="{{ profile.jabatan }}" placeholder="Contoh: Dinas Kesehatan"
                            class="w-full px-5 py-3 bg-white border-2 border-gray-200 rounded-2xl text-sm font-medium text-gray-800 placeholder:text-gray-400 focus:outline-none focus:ring-4 focus:ring-blue-500/15 focus:border-blue-600 transition-all shadow-sm hover:border-gray-300">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[11px] font-bold text-gray-400 uppercase tracking-widest ml-1">NIP</label>
                        <input type="text" id="editProfilNIP" value="{{ profile.nip }}"
                            class="w-full px-5 py-3 bg-white border-2 border-gray-200 rounded-2xl text-sm font-medium text-gray-800 placeholder:text-gray-400 focus:outline-none focus:ring-4 focus:ring-blue-500/15 focus:border-blue-600 transition-all shadow-sm hover:border-gray-300">
                    </div>
                </div>
                <div class="space-y-2">
                    <label class="text-[11px] font-bold text-gray-400 uppercase tracking-widest ml-1">Nomor Telepon</label>
                    <input type="text" id="editProfilPhone" value="{{ profile.phone|default:'' }}" placeholder="Contoh: 081234567890"
                        class="w-full px-5 py-3 bg-white border-2 border-gray-200 rounded-2xl text-sm font-medium text-gray-800 placeholder:text-gray-400 focus:outline-none focus:ring-4 focus:ring-blue-500/15 focus:border-blue-600 transition-all shadow-sm hover:border-gray-300">
                </div>
                <div class="space-y-2">
                    <label class="text-[11px] font-bold text-gray-400 uppercase tracking-widest ml-1">Alamat Lengkap</label>
                    <textarea id="editProfilAlamat" placeholder="Masukkan alamat lengkap..." rows="2.5"
                        class="w-full px-5 py-3 bg-white border-2 border-gray-200 rounded-2xl text-sm font-medium text-gray-800 placeholder:text-gray-400 focus:outline-none focus:ring-4 focus:ring-blue-500/15 focus:border-blue-600 transition-all shadow-sm hover:border-gray-300 resize-none">{{ profile.alamat|default:'' }}</textarea>
                </div>
            </form>
        </div>
        <div class="px-8 py-6 border-t border-gray-100 bg-gray-50/50 flex items-center justify-end gap-3">
            <button id="btnCancelEditProfil" type="button" class="px-6 py-2.5 rounded-xl text-sm font-bold text-gray-400 hover:text-gray-600 transition-all">Batal</button>
            <button type="submit" form="formEditProfil" class="px-8 py-2.5 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-bold transition-all shadow-lg shadow-blue-100">Simpan Perubahan</button>
        </div>
    </div>
</div>

<!-- Modal Ganti Password -->
<div id="modalGantiPassword" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4">
    <div class="fixed inset-0 bg-gray-900/60 backdrop-blur-sm transition-opacity" id="backdropGantiPassword"></div>
    <div class="relative bg-white w-full max-w-md rounded-3xl shadow-2xl overflow-hidden animate-in zoom-in duration-200">
        <div class="px-8 py-6 border-b border-gray-100 flex items-center justify-between">
            <div>
                <h2 class="text-xl font-bold text-gray-800">Ganti Password</h2>
                <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest mt-1">Keamanan Akun Anda</p>
            </div>
            <button id="closeModalGantiPassword" class="w-10 h-10 rounded-xl bg-gray-50 text-gray-400 hover:bg-red-50 hover:text-red-500 transition-all flex items-center justify-center">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <form id="formGantiPassword" class="p-8 space-y-5">
            {% csrf_token %}
            <div class="space-y-2">
                <label class="text-[11px] font-bold text-gray-400 uppercase tracking-widest ml-1">Password Lama</label>
                <input type="password" name="password_lama" required
                    class="w-full px-5 py-3 bg-white border-2 border-gray-200 rounded-2xl text-sm font-medium text-gray-800 placeholder:text-gray-400 focus:outline-none focus:ring-4 focus:ring-blue-500/15 focus:border-blue-600 transition-all shadow-sm hover:border-gray-300">
            </div>
            <div class="space-y-2">
                <label class="text-[11px] font-bold text-gray-400 uppercase tracking-widest ml-1">Password Baru</label>
                <input type="password" name="password_baru" required
                    class="w-full px-5 py-3 bg-white border-2 border-gray-200 rounded-2xl text-sm font-medium text-gray-800 placeholder:text-gray-400 focus:outline-none focus:ring-4 focus:ring-blue-500/15 focus:border-blue-600 transition-all shadow-sm hover:border-gray-300">
            </div>
            <div class="space-y-2">
                <label class="text-[11px] font-bold text-gray-400 uppercase tracking-widest ml-1">Konfirmasi Password Baru</label>
                <input type="password" name="konfirmasi_password_baru" required
                    class="w-full px-5 py-3 bg-white border-2 border-gray-200 rounded-2xl text-sm font-medium text-gray-800 placeholder:text-gray-400 focus:outline-none focus:ring-4 focus:ring-blue-500/15 focus:border-blue-600 transition-all shadow-sm hover:border-gray-300">
            </div>
            <div class="pt-4 flex items-center justify-end gap-3">
                <button id="btnCancelGantiPassword" type="button" class="px-6 py-2.5 rounded-xl text-sm font-bold text-gray-400 hover:text-gray-600 transition-all">Batal</button>
                <button type="submit" class="px-8 py-2.5 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-bold transition-all shadow-lg shadow-blue-100">Update Password</button>
            </div>
        </form>
    </div>
</div>
